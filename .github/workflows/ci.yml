name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify (${{ matrix.flutter.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        flutter:
          - name: "Flutter 3.32.0"
            version: "3.32.0"
            channel: ""
          - name: "Flutter stable"
            version: ""
            channel: "stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter.version }}
          channel: ${{ matrix.flutter.channel }}
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

  publish-dry-run:
    name: Publish dry run
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Publish dry run
        run: dart pub publish --dry-run