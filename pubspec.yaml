name: riverpod_effects
description: One-time side effects (navigation, snackbars, dialogs) for Riverpod.
version: 1.0.0
repository: https://github.com/yourusername/riverpod_effects
homepage: https://github.com/yourusername/riverpod_effects
issue_tracker: https://github.com/yourusername/riverpod_effects/issues
documentation: https://github.com/yourusername/riverpod_effects/tree/main/example

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

topics:
  - riverpod
  - side-effects
  - state-management
  - flutter

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  riverpod: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
