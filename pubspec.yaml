name: riverpod_effects
description: Bloc-like one-time side effects (navigation, snackbars, dialogs) for Riverpod. Works with Riverpod Generator.
version: 0.2.0
repository: https://github.com/yourusername/riverpod_effects
homepage: https://github.com/yourusername/riverpod_effects
issue_tracker: https://github.com/yourusername/riverpod_effects/issues
funding:
  - https://github.com/sponsors/yourusername

topics:
  - riverpod
  - state-management
  - side-effects
  - flutter
  - ui-effects

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
